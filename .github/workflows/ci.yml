name: CI

# Build, type-check, and run the Playwright end-to-end tests on every push
# (except the Pages deploy branch) and on PRs into main. Deployment is handled
# separately by deploy.yml on pushes to main.
on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (also type-checks)
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
